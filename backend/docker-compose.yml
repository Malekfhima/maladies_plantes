version: '3.8'

services:
  plant-disease-api:
    build: .
    container_name: plant-disease-api
    ports:
      - "5000:5000"
    volumes:
      - ../ml-model/models:/app/models:ro
    environment:
      - FLASK_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
